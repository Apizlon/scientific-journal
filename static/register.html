<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Регистрация • Научный журнал</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
    <script>
      if (document.cookie.includes("sj_session=")) {
        window.location.href = "/cgi-bin/index.pl";
      }
    </script>
  </head>
  <body class="page">
    <div class="auth-shell">
      <div class="auth-card">
        <h1>Регистрация</h1>
        <p class="muted">Заполните все поля — будет создан клиентский аккаунт.</p>
        <form method="post" action="/cgi-bin/register.pl">
          <label>Имя
            <input type="text" name="first_name" required />
          </label>
          <label>Фамилия
            <input type="text" name="last_name" required />
          </label>
          <label>Почта
            <input type="text" name="email" required />
          </label>
          <label>Пароль
            <input type="password" name="password" required />
          </label>
          <button class="primary-btn" type="submit">Зарегистрироваться</button>
        </form>
        <div class="auth-links">
          <a class="ghost-link" href="/login.html">Уже есть аккаунт</a>
        </div>
      </div>
    </div>
    <button type="button" class="scroll-btn up" onclick="scrollToTop()" aria-label="Наверх">↑</button>
    <button type="button" class="scroll-btn down" onclick="scrollToBottom()" aria-label="Вниз">↓</button>
    <script>
      function scrollToTop() {
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
      function scrollToBottom() {
        window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
      }
    </script>
  </body>
</html>
