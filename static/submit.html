<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Перенаправление</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
    <script>
      const target = document.cookie.includes("sj_session=")
        ? "/cgi-bin/index.pl"
        : "/login.html";
      window.location.href = target;
    </script>
  </head>
  <body class="page">
    <div class="auth-shell">
      <div class="auth-card">
        <h1>Перенаправляем</h1>
        <p class="muted">Если переход не произошёл, воспользуйтесь ссылкой ниже.</p>
        <div class="auth-links">
          <a class="primary-link" href="/cgi-bin/index.pl">Перейти в кабинет</a>
          <a class="ghost-link" href="/login.html">Войти</a>
        </div>
      </div>
    </div>
  </body>
</html>
